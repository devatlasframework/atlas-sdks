name: ci

on:
  pull_request:
  push:
    branches: [develop, main]

permissions:
  contents: read

# Per-SDK build/test jobs join here when the SDKs are scaffolded.
jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write # the action reads PR commits and comments findings
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
